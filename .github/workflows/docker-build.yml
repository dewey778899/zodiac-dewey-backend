name: Build, Push & Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

env:
  REGISTRY: registry.cn-shanghai.aliyuncs.com
  NAMESPACE: dewey_zodiac
  IMAGE: zodiac-dewey-backend
  DEPLOY_PATH: /opt/zodiac

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests -B

      - name: Smoke test Spring Boot startup
        shell: bash
        run: |
          set -euo pipefail
          timeout 10s java -jar target/zodiac-dewey.jar --spring.main.web-application-type=none > smoke.log 2>&1 || status=$?
          status=${status:-0}
          if grep -Eq "Logback configuration error detected|is not a valid conversion word|NoClassDefFoundError|Exception in thread|APPLICATION FAILED TO START|BeanCreationException|SQLiteException|H2" smoke.log; then
            cat smoke.log
            echo "Smoke test failed: startup log contains fatal errors."
            exit 1
          fi
          if [ "$status" -ne 0 ] && [ "$status" -ne 124 ]; then
            cat smoke.log
            echo "Smoke test failed with exit code $status."
            exit 1
          fi
          cat smoke.log

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sync docker compose to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          port: ${{ secrets.ECS_PORT }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          source: "docker-compose.yml"
          target: ${{ env.DEPLOY_PATH }}
          overwrite: true

      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ECS_HOST }}
          port: ${{ secrets.ECS_PORT }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            set -e
            cd ${{ env.DEPLOY_PATH }}

            # 登录 ACR (私有仓库需要)
            echo "${{ secrets.ACR_PASSWORD }}" | docker login -u "${{ secrets.ACR_USERNAME }}" --password-stdin ${{ env.REGISTRY }} 2>/dev/null || true

            # 拉取新镜像并重启
            docker compose pull backend
            docker compose up -d --force-recreate backend
            docker compose ps backend

            for i in $(seq 1 20); do
              if curl -fsS http://127.0.0.1:8080/api/health >/dev/null; then
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "Backend deployment verification failed"
                exit 1
              fi
              sleep 3
            done

            # 清理旧镜像, 释放磁盘
            docker image prune -f
