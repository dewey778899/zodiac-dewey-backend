# ==========================================
# ECS 服务器部署配置
# 放在服务器 /opt/zodiac/ 目录下使用
#
# 首次部署:
#   1. 在服务器上创建 /opt/zodiac/ 目录
#   2. 把本文件和 .env.example 复制过去 (重命名为 .env)
#   3. 编辑 .env 填入真实 API Key
#   4. 执行: docker compose up -d
#
# 后续 GitHub Actions 会自动部署, 无需手动操作
# ==========================================

services:
  frontend:
    image: registry.cn-shanghai.aliyuncs.com/dewey_zodiac/zodiac-dewey-frontend:latest
    container_name: zodiac-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: registry.cn-shanghai.aliyuncs.com/dewey_zodiac/zodiac-dewey-backend:latest
    container_name: zodiac-backend
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - TZ=Asia/Shanghai
    restart: unless-stopped
