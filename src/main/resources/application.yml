server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,text/html,text/css,application/javascript
  forward-headers-strategy: native

management:
  server:
    port: ${MANAGEMENT_PORT:59999}

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: zodiac-dewey
  datasource:
    url: ${DB_URL:jdbc:sqlite:./data/zodiac_dewey.db}
    driver-class-name: ${DB_DRIVER:org.sqlite.JDBC}
    hikari:
      maximum-pool-size: 1
      minimum-idle: 1
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.community.dialect.SQLiteDialect}
        format_sql: true
        jdbc:
          use_get_generated_keys: ${HIBERNATE_USE_GET_GENERATED_KEYS:false}
  jackson:
    default-property-inclusion: non_null

ai:
  api:
    key: ${AI_API_KEY:${DEEPSEEK_API_KEY:}}
    url: ${AI_API_URL:https://api.deepseek.com/chat/completions}
    model: ${AI_MODEL:deepseek-chat}
    max-tokens: ${AI_MAX_TOKENS:8000}
    timeout-seconds: ${AI_TIMEOUT_SECONDS:180}
    retry-count: ${AI_RETRY_COUNT:1}
    claude:
      key: ${CLAUDE_API_KEY:}
      url: ${CLAUDE_API_URL:https://api.anthropic.com/v1/messages}
      model: ${CLAUDE_MODEL:claude-opus-4-8}
      max-tokens: ${CLAUDE_MAX_TOKENS:8000}
      timeout-seconds: ${CLAUDE_TIMEOUT_SECONDS:120}
    proxy:
      host: ${AI_PROXY_HOST:}
      port: ${AI_PROXY_PORT:0}

ratelimit:
  daily-total: ${RATELIMIT_DAILY_TOTAL:200}
  per-ip-daily: ${RATELIMIT_PER_IP:3}
  claude-per-ip-daily: ${RATELIMIT_CLAUDE_PER_IP:5}
  enabled: ${RATELIMIT_ENABLED:true}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://localhost:3000,http://127.0.0.1:3000,http://192.168.*:3000,http://192.168.*:8080,http://10.*:3000,http://10.*:8080,http://172.16.*:3000,http://172.16.*:8080,http://172.17.*:3000,http://172.17.*:8080,http://172.18.*:3000,http://172.18.*:8080,http://172.19.*:3000,http://172.19.*:8080,http://172.20.*:3000,http://172.20.*:8080,http://172.21.*:3000,http://172.21.*:8080,http://172.22.*:3000,http://172.22.*:8080,http://172.23.*:3000,http://172.23.*:8080,http://172.24.*:3000,http://172.24.*:8080,http://172.25.*:3000,http://172.25.*:8080,http://172.26.*:3000,http://172.26.*:8080,http://172.27.*:3000,http://172.27.*:8080,http://172.28.*:3000,http://172.28.*:8080,http://172.29.*:3000,http://172.29.*:8080,http://172.30.*:3000,http://172.30.*:8080,http://172.31.*:3000,http://172.31.*:8080}

admin:
  username: ${ADMIN_USERNAME:dewey}
  password: ${ADMIN_PASSWORD:dewey}
  session-hours: ${ADMIN_SESSION_HOURS:12}

payment:
  common:
    amount-fen: ${PAY_AMOUNT_FEN:1990}
    order-expire-minutes: ${PAY_ORDER_EXPIRE_MINUTES:30}
    success-poll-interval-ms: ${PAY_SUCCESS_POLL_INTERVAL_MS:3000}
    success-poll-timeout-ms: ${PAY_SUCCESS_POLL_TIMEOUT_MS:180000}
    fallback-qr-enabled: ${PAY_FALLBACK_QR_ENABLED:false}
    dev-mock-enabled: ${PAY_DEV_MOCK_ENABLED:true}
  wechat:
    enabled: ${WECHAT_PAY_ENABLED:false}
    mch-id: ${WECHAT_PAY_MCH_ID:}
    app-id: ${WECHAT_PAY_APP_ID:}
    api-v3-key: ${WECHAT_PAY_API_V3_KEY:}
    mch-serial-no: ${WECHAT_PAY_MCH_SERIAL_NO:}
    private-key-path: ${WECHAT_PAY_PRIVATE_KEY_PATH:}
    platform-cert-path: ${WECHAT_PAY_PLATFORM_CERT_PATH:}
    notify-url: ${WECHAT_PAY_NOTIFY_URL:}
    h5-return-url: ${WECHAT_PAY_H5_RETURN_URL:}
    oauth-redirect-url: ${WECHAT_OAUTH_REDIRECT_URL:}
  alipay:
    enabled: ${ALIPAY_ENABLED:false}
    app-id: ${ALIPAY_APP_ID:}
    private-key-path: ${ALIPAY_PRIVATE_KEY_PATH:}
    public-key: ${ALIPAY_PUBLIC_KEY:}
    notify-url: ${ALIPAY_NOTIFY_URL:}
    return-url: ${ALIPAY_RETURN_URL:}
    sign-type: ${ALIPAY_SIGN_TYPE:RSA2}

logging:
  level:
    com.zodiac.api: INFO
    org.hibernate.SQL: WARN
    root: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"
